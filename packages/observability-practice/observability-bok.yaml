# =============================================================================
# LIFECYCLE INTEGRATION
# =============================================================================
# The observability lifecycle is the structural spine of the Core Practice
# category. This section makes the lifecycle→KA mapping explicit and
# declares the dependency chain.
      - target: "KA01"
        relationship: "depends_on"
        description: "Business context supplies the understanding that improvement acts on"

lifecycle:
  name: "Observability Lifecycle"
  stages:
    - stage: "Define"
      ka: "KA01"
      depends_on: null
      feeds: "Implement"
      feedback_from: "Respond"
    - stage: "Implement"
      ka: "KA02"
      depends_on: "Define"
      feeds: "Enforce"
    - stage: "Enforce"
      ka: "KA03"
      depends_on: "Implement"
      feeds: "Observe"
    - stage: "Observe"
      ka: "KA04"
      depends_on: "Enforce"
      feeds: "Respond"
    - stage: "Respond"
      ka: "KA05"
      depends_on: "Observe"
      feeds_back_to: "Define"
  principle: >
    The dependency chain is structural: you cannot observe what you haven't
    instrumented, cannot instrument what you haven't defined. The feedback
    loop from Respond back to Define makes the lifecycle iterative, not
    linear.

# =============================================================================
# BOUNDARY RULES
# =============================================================================
# When a topic could belong to multiple KAs, these rules determine
# primary placement. Cross-references handle secondary relevance.

boundary_rules:
  - name: "Design vs. Implementation"
    rule: >
      Design decisions (what to do, which approach) belong in Core Practice KAs.
      Implementation details (how to configure, which tool settings) belong in
      Enabling Practice KAs. Example: 'Use OTel semantic conventions' = KA02.
      'Configure OTel Collector enrichment processor' = KA06.

  - name: "Standard vs. Governance"
    rule: >
      A specific standard or template belongs in KA03 (Standards & QA).
      The organizational process of maintaining standards coherence at scale
      belongs in KA08 (Data Management & Governance). Example: 'Signal naming
      convention' = KA03. 'Who approves changes to the naming convention' = KA08.

  - name: "Strategy vs. Stakeholder"
    rule: >
      Strategic decisions about direction, prioritization, and operating model
      belong in KA09 (Strategy). The work of communicating, advocating, and
      facilitating stakeholder engagement belongs in KA10. Example: 'Prioritize
      Theme 1 over Theme 3' = KA09. 'Frame Theme 1 for the champions-group
      audience' = KA10.

  - name: "Adoption vs. Organizational Capability"
    rule: >
      Mechanisms for teams to adopt the practice (packages, pilots, training)
      belong in KA12 (Adoption). The organizational structure, roles, and
      skills that determine adoption capacity belong in KA11 (Org Capability).
      Example: 'Transfer package for LOB pilot' = KA12. 'Do we have POs who
      can fill service profiles?' = KA11.

  - name: "Cross-cutting topics"
    rule: >
      When a topic genuinely spans multiple KAs (e.g., a queue-depth metric
      spanning KA01, KA02, KA04, KA08), assign primary KA based on where the
      OPEN QUESTION lives. If the open question is correlation (how does anyone
      know THIS queue spike means LOAN PROCESSING is impacted?), primary = KA04.
      Cross-reference to the other KAs involved.

# =============================================================================
# RELATIONSHIP TYPE VOCABULARY
# =============================================================================
# Controlled vocabulary for cross-KA relationship types. Every cross_ka
# declaration must use one of these types. Agents use these to reason about
# dependency direction, impact analysis, and navigation.

relationship_types:
  depends_on:
    description: "Cannot function without the target KA's outputs"
    direction: "source requires target"
    example: "KA02 depends_on KA01 — cannot design signals without business context"

  feeds:
    description: "Produces outputs consumed by the target KA"
    direction: "source produces for target"
    example: "KA01 feeds KA02 — business context feeds signal design"

  enables:
    description: "Makes the target KA's work possible but is not a hard dependency"
    direction: "source supports target"
    example: "KA06 enables KA04 — platform provides tools for monitoring"

  implements:
    description: "Operationalizes decisions made in the target KA"
    direction: "source realizes target's designs"
    example: "KA06 implements KA02 — platform operationalizes signal designs"

  constrains:
    description: "Limits or shapes options available to the target KA"
    direction: "source bounds target"
    example: "KA07 constrains KA09 — enterprise architecture constrains strategy"

  governs:
    description: "Sets rules and standards that the target KA must follow"
    direction: "source regulates target"
    example: "KA08 governs KA01 — governance ensures definitions stay coherent"

  informs:
    description: "Provides information that influences but does not determine the target"
    direction: "source advises target"
    example: "KA13 informs KA09 — practice metrics inform strategic decisions"

  feeds_back:
    description: "Returns learning/signal to an upstream KA, completing a loop"
    direction: "source returns to target"
    example: "KA05 feeds_back KA01 — incidents reveal business context gaps"

  enabled_by:
    description: "Mirror of enables — the target KA makes this KA's work possible without being a hard dependency"
    direction: "source supported by target"
    example: "KA07 enabled_by KA06 — platform makes integration architecture executable"

  informed_by:
    description: "Mirror of informs — the target KA provides information that influences but does not determine this KA"
    direction: "source advised by target"
    example: "KA08 informed_by KA07 — integration patterns shape governance requirements"

  constrained_by:
    description: "Mirror of constrains — the target KA limits or shapes this KA's options"
    direction: "source bounded by target"
    example: "KA09 constrained_by KA11 — capability maturity bounds strategy"

  implemented_by:
    description: "Mirror of implements — the target KA operationalizes decisions made in this KA"
    direction: "source realized by target"
    example: "KA01 implemented_by KA12 — adoption operationalizes business-context definitions"

# =============================================================================
# MATURITY MODEL (DECLARED, NOT YET CALIBRATED)
# =============================================================================
# Every established BOK has or references a maturity model. This section
# declares the structure; calibration requires real assessment data.
# Target: v0.3 with maturity indicators populated per KA.
#
# Follows CMMI-style levels adapted for observability:
#   Level 1 — Initial: ad hoc, person-dependent, no standard practice
#   Level 2 — Managed: documented practices exist, applied inconsistently
#   Level 3 — Defined: standardized across the organization, measured
#   Level 4 — Quantitatively Managed: data-driven decisions, predictive
#   Level 5 — Optimizing: continuous improvement from data, adaptive

maturity_model:
  status: "declared — not yet calibrated"
  target_version: "0.3.0"
  levels:
    - level: 1
      name: "Initial"
      description: "Ad hoc, person-dependent, no standard practice"
    - level: 2
      name: "Managed"
      description: "Documented practices exist, applied inconsistently"
    - level: 3
      name: "Defined"
      description: "Standardized across the organization, measured"
    - level: 4
      name: "Quantitatively Managed"
      description: "Data-driven decisions, predictive capability"
    - level: 5
      name: "Optimizing"
      description: "Continuous improvement from data, adaptive"
  note: >
    Per-KA maturity assessment is the primary use case. Each KA gets a current
    level and target level. The gap between current and target drives
    investment prioritization (KA09) and improvement planning (KA13).

