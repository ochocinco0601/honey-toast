# Observability Body of Knowledge (O-BOK)
# Structural definition — machine-readable, agent-consumable
#
# Prior art: Follows the Body of Knowledge structural pattern used by
# SWEBOK (software engineering), PMBOK (project management),
# DMBOK (data management), BABOK (business analysis), ITIL 4 (service management).
#
# Each of these organizes a professional domain into Knowledge Areas (KAs)
# so that any topic resolves to a known location. This artifact does the
# same for the observability domain.
#
# Scope: Reference pattern for enterprise observability practice.
# Not bespoke to any organization. Implementable by any enterprise
# pursuing observability maturity.
#
# Design principles:
#   1. Lifecycle-aligned core — the observability lifecycle (Define → Respond)
#      is the structural spine. Core Practice KAs map 1:1 to lifecycle stages.
#   2. Cross-cutting enablers — Platform, Integration, and Governance span
#      all lifecycle stages. They make core practices possible.
#   3. Management practices surround — Strategy, Stakeholders, People,
#      Adoption, and Improvement govern and sustain the whole.
#   4. Structure over prose — boundary rules, cross-KA relationships, and
#      content states are declared explicitly so any topic resolves to a
#      known location with a known state.
#
# Structural anatomy (from established BOK prior art):
#   - Knowledge Areas: major divisions of the domain (this file)
#   - Topics: subdivisions within each KA (nested below)
#   - Cross-KA relationships: declared interaction points
#   - Boundary rules: where ambiguous topics land
#   - Role mappings: which roles own which KAs
#   - Maturity indicators: what capability looks like at each level
#
# Machine-readable companion to the human-readable markdown pages. An AI
# session can load this file directly to resolve a topic to KA coordinates,
# navigate cross-KA dependencies, and classify ambiguous items against the
# boundary rules — without loading the full markdown.

version: "0.2.0"
status: draft
name: "Observability Body of Knowledge"
short_name: "O-BOK"

# =============================================================================
# CATEGORIES
# =============================================================================
# Three categories, following ITIL 4's pattern of separating
# core/enabling/management practices. Each category serves a
# different audience and operates at a different level.

categories:
  core-practice:
    name: "Core Practice"
    description: >
      The observability lifecycle — what practitioners do, stage by stage.
      Lifecycle-aligned: each KA maps to one stage. The dependency chain
      is structural — you cannot observe what you haven't instrumented,
      cannot instrument what you haven't defined.
    audience: "Practitioners (Product Owners, Developers, SREs)"
    organizes_by: "Lifecycle stage"

  enabling-practice:
    name: "Enabling Practice"
    description: >
      Cross-cutting capabilities that make core practices possible.
      These span all lifecycle stages. Technology decisions, architectural
      integration, and data governance don't belong to one stage — they
      serve all of them.
    audience: "Platform teams, Architecture, Engineering leadership"
    organizes_by: "Capability domain"

  management-practice:
    name: "Management Practice"
    description: >
      How the observability practice is led, sustained, and improved.
      Strategy, stakeholder engagement, people, adoption, and continuous
      improvement. These govern the whole system.
    audience: "Leadership, Program management, Practice leads"
    organizes_by: "Organizational function"

# =============================================================================
# KNOWLEDGE AREAS
# =============================================================================

knowledge_areas:

  # ---------------------------------------------------------------------------
  # CORE PRACTICE — Lifecycle-Aligned
  # ---------------------------------------------------------------------------

  ka01-business-context:
    id: "KA01"
    name: "Business Context & Service Definition"
    category: core-practice
    lifecycle_stage: "Define"
    primary_owner: "Product Owner"
    description: >
      What matters to the business. Defining stakeholder expectations,
      business functions, service boundaries, and impact categories.
      The foundation that everything else depends on — without business
      context, signals are just data.
    question: "What does 'healthy' mean in business terms?"
    topics:
      - id: "KA01.1"
        name: "Stakeholder Identification & Expectations"
        description: "Who cares, what they need, how they define success"
      - id: "KA01.2"
        name: "Business Function Mapping"
        description: "What the business does, decomposed into observable functions"
      - id: "KA01.3"
        name: "Service Definition & Boundaries"
        description: "Scoping the unit of observability — what constitutes a service"
      - id: "KA01.4"
        name: "Impact Category Classification"
        description: "Revenue, regulatory, customer experience, operational risk"
      - id: "KA01.5"
        name: "Service Profile Construction"
        description: "The structured artifact that captures business context for a service"
      - id: "KA01.6"
        name: "SLO Definition & Error Budget Allocation"
        description: >
          Translating stakeholder expectations into quantitative targets (SLOs)
          and allocating error budgets that make reliability trade-offs explicit.
          SLOs are stakeholder expectations made measurable. SLIs are the signals
          that measure them (cross-ref KA02). Error budgets are the decision
          framework for balancing velocity and reliability (cross-ref KA09).
          Prior art: Google SRE, Alex Hidalgo 'Implementing SLOs'.
    cross_ka:
      - target: "KA02"
        relationship: "feeds"
        description: "Business context determines what signals to design"
      - target: "KA08"
        relationship: "informs"
        description: "Business context determines data governance requirements"
      - target: "KA05"
        relationship: "feeds"
        description: "Business context determines incident severity and triage priority"
      - target: "KA12"
        relationship: "implemented_by"
        description: "Adoption & enablement operationalizes business-context definitions in team practice"
      - target: "KA13"
        relationship: "feeds"
        description: "Service Understanding Documents capture schema-ahead understanding — the growth signal continuous improvement acts on"
      - target: "KA07"
        relationship: "depends_on"
        description: "CMDB, service registry, and enterprise service-hierarchy data provide the raw material for service identification"
      - target: "KA09"
        relationship: "informs"
        description: "Aggregate business context across services feeds strategic prioritization"
      - target: "KA04"
        relationship: "feeds"
        description: "Business context determines dashboard content — expectations, impact categories, targets"

  ka02-signal-design:
    id: "KA02"
    name: "Signal Design & Instrumentation"
    category: core-practice
    lifecycle_stage: "Implement"
    primary_owner: "Developer"
    description: >
      How business context becomes measurable. Signal types, signal
      hierarchy, instrumentation strategy, semantic conventions, and
      the signal-to-function mapping that connects technical telemetry
      to business meaning.
    question: "How do we instrument the signals that matter?"
    topics:
      - id: "KA02.1"
        name: "Signal Type Taxonomy"
        description: "Four-layer model: System, Application, Business Health, Business Impact"
      - id: "KA02.2"
        name: "Signal-to-Function Mapping"
        description: "Semantic binding between signals and business functions they serve"
      - id: "KA02.3"
        name: "Instrumentation Strategy"
        description: "Where and how signals are emitted — code-level, pipeline, agent-based"
      - id: "KA02.4"
        name: "Signal Hierarchy & Dependencies"
        description: "How signals relate — leading/lagging, upstream/downstream, composite"
      - id: "KA02.5"
        name: "Semantic Conventions"
        description: "Naming, tagging, attribute standards that carry business context with telemetry"
      - id: "KA02.6"
        name: "Telemetry Pillars — Metrics, Logs, Traces, Profiles"
        description: >
          The industry-standard signal categories: metrics (aggregated numeric
          measurements), logs (discrete event records), traces (distributed
          request flows), profiles (resource consumption snapshots). Each pillar
          has distinct instrumentation patterns, storage characteristics, and
          query models. The four-layer model (KA02.1) classifies by business
          meaning; the pillars classify by data shape.
      - id: "KA02.7"
        name: "Data Cardinality & Dimensionality"
        description: >
          High-cardinality data (unique user IDs, request IDs, trace IDs) enables
          investigative observability — the ability to ask novel questions about
          specific cohorts, transactions, or paths. Also drives cost (cross-ref
          KA06). The tension between cardinality and economics is a defining
          challenge of observability at scale. Prior art: Charity Majors,
          Ben Sigelman on high-cardinality observability.
    cross_ka:
      - target: "KA01"
        relationship: "depends_on"
        description: "Cannot design signals without business context"
      - target: "KA06"
        relationship: "depends_on"
        description: "Signal designs are operationalized through platform tooling"
      - target: "KA03"
        relationship: "feeds"
        description: "Signal designs become the basis for quality standards"
      - target: "KA04"
        relationship: "feeds"
        description: "Implemented signals become the data for dashboards and monitoring"
    boundary_rules:
      - rule: "Design decision vs implementation"
        guidance: >
          'We will use OTel semantic conventions for service identity' is KA02
          (design decision). 'Configure the OTel Collector processor to enrich
          with these attributes' is KA06 (platform implementation).

  ka03-standards-quality:
    id: "KA03"
    name: "Standards & Quality Assurance"
    category: core-practice
    lifecycle_stage: "Enforce"
    primary_owner: "Platform / Engineering"
    description: >
      How observability standards are enforced before production.
      Quality gates, compliance checks, metadata validation, and the
      mechanisms that prevent observability debt from accumulating.
    question: "How do we ensure standards before production?"
    topics:
      - id: "KA03.1"
        name: "Quality Gates & Pipeline Integration"
        description: "CI/CD gates that enforce observability metadata requirements"
      - id: "KA03.2"
        name: "Observability Readiness Criteria"
        description: "What 'production-ready' means for observability — NFR integration"
      - id: "KA03.3"
        name: "Compliance & Regulatory Alignment"
        description: "Permit-to-operate, regulatory frameworks, audit requirements"
      - id: "KA03.4"
        name: "Template & Blueprint Standards"
        description: "Reusable patterns teams follow — the 'standards and guidance' ask"
      - id: "KA03.5"
        name: "Validation & Verification"
        description: "Automated checks that observability artifacts meet schema and quality"
    cross_ka:
      - target: "KA02"
        relationship: "depends_on"
        description: "Standards enforce what signal design specifies"
      - target: "KA07"
        relationship: "enables"
        description: "Quality gates integrate into CI/CD and enterprise architecture"
      - target: "KA08"
        relationship: "governs"
        description: "Standards are the enforcement arm of governance"
      - target: "KA04"
        relationship: "feeds"
        description: "Quality-validated signals reach production dashboards"

  ka04-monitoring-visualization:
    id: "KA04"
    name: "Monitoring, Visualization & Correlation"
    category: core-practice
    lifecycle_stage: "Observe"
    primary_owner: "Platform / SRE"
    description: >
      How signals become visible and actionable. Dashboards, real-time
      monitoring, cross-signal correlation, topology awareness, and the
      presentation layer that makes business health observable.
    question: "What views make health visible?"
    topics:
      - id: "KA04.1"
        name: "Dashboard Design & Standards"
        description: "Consistent visualization patterns — executive, operational, team-level"
      - id: "KA04.2"
        name: "Real-Time Monitoring"
        description: "Continuous observation of signal streams, threshold alerting"
      - id: "KA04.3"
        name: "Cross-Signal Correlation"
        description: "Connecting signals across services, layers, and tools to surface patterns"
      - id: "KA04.4"
        name: "Topology & Dependency Visualization"
        description: "Making service relationships and infrastructure dependencies visible"
      - id: "KA04.5"
        name: "Business Health Views"
        description: "Aggregate views showing business outcome health, not just system metrics"
      - id: "KA04.6"
        name: "Exploratory Analysis & Hypothesis-Driven Investigation"
        description: >
          The capability that distinguishes observability from monitoring: asking
          novel questions about system behavior without pre-defining the queries.
          Slice-and-dice across high-cardinality dimensions. Investigating WHY,
          not just detecting THAT. Prior art: Charity Majors on observability
          vs. monitoring, Ben Sigelman on distributed tracing for understanding.
    cross_ka:
      - target: "KA02"
        relationship: "depends_on"
        description: "Visualization depends on instrumented signals"
      - target: "KA06"
        relationship: "depends_on"
        description: "Dashboards and monitoring are built on platform tooling"
      - target: "KA05"
        relationship: "feeds"
        description: "Monitoring surfaces the events that trigger incident response"
      - target: "KA01"
        relationship: "depends_on"
        description: "Business context determines dashboard content"
      - target: "KA03"
        relationship: "depends_on"
        description: "Quality gates ensure only validated signals reach production dashboards"
      - target: "KA09"
        relationship: "informs"
        description: "Portfolio health views and coverage metrics inform strategic decisions"

  ka05-incident-response:
    id: "KA05"
    name: "Incident Management & Response"
    category: core-practice
    lifecycle_stage: "Respond"
    primary_owner: "SRE / Ops"
    description: >
      What happens when things break. Triage, escalation, severity
      determination, playbook execution, postmortems, and the feedback
      loop that turns incidents into improved definitions.
    question: "When something fails, what do we do?"
    topics:
      - id: "KA05.1"
        name: "Triage & Severity Determination"
        description: "Business-context-aware triage — knowing which signals matter"
      - id: "KA05.2"
        name: "Escalation & Team Composition"
        description: "Who gets called, role-based response, communication protocols"
      - id: "KA05.3"
        name: "Playbook Design & Execution"
        description: "Pre-built response procedures tied to signal patterns and business context"
      - id: "KA05.4"
        name: "Postmortem & Learning"
        description: "Structured incident review, root cause analysis, improvement actions"
      - id: "KA05.5"
        name: "Feedback to Definition"
        description: "Incidents reveal gaps in business context — the lifecycle feedback loop"
    cross_ka:
      - target: "KA04"
        relationship: "depends_on"
        description: "Response depends on monitoring detecting the problem"
      - target: "KA01"
        relationship: "feeds_back"
        description: "Incidents reveal business context gaps — completes the lifecycle loop"
      - target: "KA11"
        relationship: "depends_on"
        description: "Effective response requires the right people with the right skills"

  # ---------------------------------------------------------------------------
  # ENABLING PRACTICE — Cross-Cutting
  # ---------------------------------------------------------------------------
      - target: "KA13"
        relationship: "feeds"
        description: "Incident learnings feed continuous improvement — postmortem findings become practice changes"

  ka06-platform-tooling:
    id: "KA06"
    name: "Platform & Tooling"
    category: enabling-practice
    description: >
      The technology landscape that makes observability possible.
      Tool selection and lifecycle, pipeline architecture, collector
      configuration, consolidation vs. best-of-breed decisions, and
      the operational management of the observability platform itself.
    topics:
      - id: "KA06.1"
        name: "Tool Landscape & Selection"
        description: "Evaluating, selecting, and managing observability tools"
      - id: "KA06.2"
        name: "Telemetry Pipeline Architecture"
        description: "Collection, routing, enrichment, storage — the data flow"
      - id: "KA06.3"
        name: "Consolidation vs. Best-of-Breed"
        description: "Enterprise platform strategy — single vendor vs. specialized tools"
      - id: "KA06.4"
        name: "Platform Operations"
        description: "Running the observability platform itself — availability, capacity, cost"
      - id: "KA06.5"
        name: "Observability-as-Code"
        description: "Infrastructure-as-code patterns for observability configuration"
      - id: "KA06.6"
        name: "Observability Economics & Cost Optimization"
        description: >
          The financial dimension of observability platform management. Data
          volume costs, tool licensing, storage retention policies, sampling
          strategies, and cost-per-signal economics. Directly connected to
          cardinality decisions (KA02.7) — high-cardinality data enables
          investigation but drives cost. FinOps practices applied to the
          observability stack. Prior art: FinOps Foundation, Gartner
          observability cost management research.
          Cross-ref: KA09 for investment justification at leadership level.
    cross_ka:
      - target: "KA02"
        relationship: "implements"
        description: "Platform implements signal design decisions"
      - target: "KA04"
        relationship: "enables"
        description: "Platform provides the tools for monitoring and visualization"
      - target: "KA07"
        relationship: "enables"
        description: "Platform must integrate with enterprise architecture"
      - target: "KA12"
        relationship: "enables"
        description: "Tool selection knowledge underpins self-service tool discovery in onboarding"

  ka07-integration-architecture:
    id: "KA07"
    name: "Integration & Architecture"
    category: enabling-practice
    description: >
      How observability connects to adjacent enterprise systems and
      initiatives. CMDB, CI/CD pipelines, regulatory frameworks,
      business service frameworks, and the architectural decisions that
      determine whether observability fits into the enterprise or sits
      beside it.
    topics:
      - id: "KA07.1"
        name: "CMDB & Service Registry Integration"
        description: "Connecting observability to configuration management data"
      - id: "KA07.2"
        name: "CI/CD Pipeline Integration"
        description: "Embedding observability into the software delivery pipeline"
      - id: "KA07.3"
        name: "Regulatory & Compliance Frameworks"
        description: "Alignment with enterprise critical products, permit-to-operate, audit"
      - id: "KA07.4"
        name: "Adjacent Initiative Alignment"
        description: "Business service frameworks, enterprise architecture programs"
      - id: "KA07.5"
        name: "Enterprise Architecture Positioning"
        description: "Where observability sits in the enterprise architecture — BIAN, TOGAF alignment"
    cross_ka:
      - target: "KA03"
        relationship: "enables"
        description: "Architectural integration makes quality gate enforcement possible"
      - target: "KA08"
        relationship: "informs"
        description: "Integration points determine governance scope"
      - target: "KA09"
        relationship: "constrains"
        description: "Enterprise architecture constrains strategic options"
      - target: "KA06"
        relationship: "enabled_by"
        description: "Platform and tooling provide the runtime that makes integration architecture executable"
      - target: "KA01"
        relationship: "feeds"
        description: "CMDB and service-hierarchy data provide the raw material for service identification"

  ka08-data-governance:
    id: "KA08"
    name: "Data Management & Governance"
    category: enabling-practice
    description: >
      How the observability practice maintains data coherence at scale.
      Capability registry, naming standards, service catalog, data
      quality, and the organizational mechanisms that keep the knowledge
      base current — the hardest problem in any registry effort.
    topics:
      - id: "KA08.1"
        name: "Service Catalog & Capability Registry"
        description: "Central inventory of services, capabilities, and their metadata"
      - id: "KA08.2"
        name: "Naming Standards & Conventions"
        description: "Enterprise-wide naming for services, signals, dashboards"
      - id: "KA08.3"
        name: "Data Quality & Currency"
        description: "Keeping the knowledge base current — the evergreen challenge"
      - id: "KA08.4"
        name: "Schema Management"
        description: "Data model evolution, versioning, migration, consistency"
      - id: "KA08.5"
        name: "Ownership & Accountability"
        description: "Who maintains what — preventing the stale service catalog problem"
      - id: "KA08.6"
        name: "Telemetry Security, Privacy & Access Control"
        description: >
          Security and privacy governance for observability data. Telemetry can
          contain PII (user IDs in logs, request parameters), sensitive business
          data, and regulated information. Covers: log sanitization/redaction,
          dashboard and alert access control, data residency for telemetry in
          regulated industries, audit trail requirements. In banking context,
          this intersects with regulatory compliance (cross-ref KA07.3).
          Prior art: DMBOK Data Security KA, ITIL Information Security Management.
    cross_ka:
      - target: "KA01"
        relationship: "governs"
        description: "Governance ensures business context definitions stay coherent"
      - target: "KA03"
        relationship: "depends_on"
        description: "Standards enforce governance decisions"
      - target: "KA13"
        relationship: "informs"
        description: "Governance health is a key practice metric"

  # ---------------------------------------------------------------------------
  # MANAGEMENT PRACTICE — Organizational
  # ---------------------------------------------------------------------------
      - target: "KA07"
        relationship: "informed_by"
        description: "Integration architecture patterns shape data governance requirements"

  ka09-strategy-program:
    id: "KA09"
    name: "Strategy & Program Management"
    category: management-practice
    description: >
      How observability aligns with enterprise direction. Program
      structure, theme prioritization, operating model design, roadmap
      management, and the altitude cascade from enterprise strategy
      to team-level execution.
    topics:
      - id: "KA09.1"
        name: "Enterprise Alignment"
        description: "Connecting observability to business strategy, OKRs, executive priorities"
      - id: "KA09.2"
        name: "Program Structure & Governance"
        description: "Working groups, steering committees, decision rights, meeting cadence"
      - id: "KA09.3"
        name: "Theme Prioritization"
        description: "Identifying, evaluating, and sequencing strategic themes"
      - id: "KA09.4"
        name: "Operating Model Design"
        description: "How the observability function operates — centralized, federated, hybrid"
      - id: "KA09.5"
        name: "Roadmap & Altitude Cascade"
        description: "Translating strategy through division goals to team-level actions (Hoshin Kanri)"
      - id: "KA09.6"
        name: "Assumption-Based Planning"
        description: "Load-bearing assumptions, signposts, hedging actions, scenario management"
      - id: "KA09.7"
        name: "Investment Justification & Value Demonstration"
        description: >
          Making the business case for observability investment. Connecting
          observability outcomes to business value — reduced MTTR to dollar
          savings, faster detection to avoided revenue loss, proactive
          identification to risk reduction. Dimensional decomposition
          applies: honest attribution of which specific dimension the
          investment moves, not claiming credit for aggregate metrics.
          Cross-ref: KA06.6 for cost side, KA13.1 for practice metrics.
    cross_ka:
      - target: "KA10"
        relationship: "depends_on"
        description: "Strategy requires stakeholder engagement to land"
      - target: "KA12"
        relationship: "feeds"
        description: "Strategic decisions drive adoption priorities"
      - target: "KA07"
        relationship: "constrains"
        description: "Strategy operates within enterprise architecture constraints"
      - target: "KA11"
        relationship: "constrained_by"
        description: "Organizational capability maturity bounds what strategy can commit to"
      - target: "KA13"
        relationship: "informed_by"
        description: "Improvement findings adjust strategic direction"
      - target: "KA01"
        relationship: "informed_by"
        description: "Aggregate business context feeds strategic prioritization"
      - target: "KA04"
        relationship: "informed_by"
        description: "Portfolio health views inform strategic decisions"

