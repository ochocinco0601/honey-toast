# =============================================================================
# PRIOR ART ATTRIBUTION
# =============================================================================
# Named sources for the structural patterns used in this BOK.
# The structure is adopted, not invented. The content is domain-specific.

prior_art:
  bok_pattern:
    sources:
      - "SWEBOK v4 — IEEE/ISO (software engineering, 15 KAs)"
      - "PMBOK 7th Ed — PMI (project management, 8 performance domains)"
      - "DMBOK 2 — DAMA International (data management, 11 KAs)"
      - "BABOK v3 — IIBA (business analysis, 6 KAs)"
      - "ITIL 4 — Axelos (service management, 34 practices in 3 categories)"
    principle: >
      Every major professional domain organizes into a Body of Knowledge with
      knowledge areas, processes, roles, vocabulary, and maturity models.
      This artifact follows that established pattern for the observability domain.

  category_pattern:
    source: "ITIL 4 — three practice categories (General, Service, Technical)"
    adaptation: "Renamed to Core/Enabling/Management to match observability domain"

  lifecycle_pattern:
    source: "Business Observability Lifecycle (Define → Implement → Enforce → Observe → Respond)"
    note: "Lifecycle predates and validates KA structure — the alignment is by design"

  altitude_management:
    sources:
      - "Hoshin Kanri — strategy deployment with X-matrix (Toyota, Akao)"
      - "ABP — Assumption-Based Planning (RAND Corporation, Dewar et al.)"
    application: "KA09 topics include altitude cascade and assumption tracking"

  reference_implementation:
    source: "GitLab Handbook — public repo implementing full strategy-to-operations in one system"
    note: >
      GitLab is not a BOK but demonstrates the information architecture
      pattern where any topic resolves to a known location with explicit
      connections. The O-BOK adopts this navigability property.
