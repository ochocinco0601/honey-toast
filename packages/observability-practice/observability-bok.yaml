# =============================================================================
# PERSPECTIVES
# =============================================================================
# Platform-type and context-type lenses that bend how Knowledge Areas and
# Practice Instruments apply. Third peer structural element alongside KAs
# and Instruments. Where KAs organize what practitioners UNDERSTAND and
# Instruments organize what practitioners DO, Perspectives organize how
# both VARY by platform context.
#
# Pattern: BABOK v3 Perspectives Chapter (IIBA, 2015). Perspectives are not
# Knowledge Areas (they don't own distinct knowledge) and not Instruments
# (they don't do one thing). They're lenses that bend the existing KAs for
# specific contexts.
# Added: design iteration 3.
#
# Perspective pages: observability-bok/perspectives/
# Catalog index: observability-bok/perspectives/README.md
#
# ASYMMETRY: Perspectives point INTO KAs (via ka_variations). KAs do NOT
# enumerate perspectives back. This keeps KAs perspective-invariant —
# adding a new perspective doesn't require modifying any KA.

perspectives:

  - id: "PERSP-CLOUD-NATIVE"
    name: "Cloud-Native"
    state: seeded
    description: >
      Container platforms, service mesh, OpenTelemetry-native instrumentation.
      The context where the observability industry's center of gravity sits.
    ka_variations: ["KA02", "KA04", "KA05", "KA06", "KA07"]
    page: "perspectives/cloud-native.md"

  - id: "PERSP-MAINFRAME"
    name: "Mainframe"
    state: seeded
    description: >
      Z/OS and distributed mainframe environments, CICS/IMS transaction
      monitors, batch-processing workloads, SMF and RMF record feeds.
      The context the observability industry's mainstream literature
      rarely addresses directly.
    ka_variations: ["KA02", "KA04", "KA05", "KA06", "KA07"]
    page: "perspectives/mainframe.md"

  - id: "PERSP-HYBRID"
    name: "Hybrid / Integration-Oriented"
    state: seeded
    description: >
      Multi-platform business flows where transactions cross cloud,
      mainframe, SaaS, and third-party boundaries. The "seam problem" —
      cross-platform correlation, metadata parity, trace propagation
      across technology boundaries.
    ka_variations: ["KA02", "KA04", "KA05", "KA07", "KA08"]
    page: "perspectives/hybrid-integration.md"

  - id: "PERSP-SAAS"
    name: "SaaS / Third-Party"
    state: seeded
    description: >
      Observed systems operated by someone else. Salesforce, Workday,
      payment processors, fraud-detection vendors, identity providers.
      Observation without code access.
    ka_variations: ["KA02", "KA04", "KA05", "KA06", "KA07"]
    page: "perspectives/saas-third-party.md"

  - id: "PERSP-AGENTIC"
    name: "Agentic"
    state: current
    description: >
      Services containing an agentic step — software that makes a judgment
      call and can be confidently wrong: up, fast, error-free, and mistaken.
      The conditional Agent Workflow stratum (provisional vocabulary),
      decision-quality signals, and the answer-key obligation. Workload-type
      context lens; vocabulary iterates with industry convergence.
    ka_variations: ["KA01", "KA02", "KA05"]
    page: "perspectives/agentic.md"

