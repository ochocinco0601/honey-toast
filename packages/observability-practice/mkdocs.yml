site_name: Observability Body of Knowledge
site_description: 13 Knowledge Areas and 24 Practice Instruments — the scope of enterprise observability
docs_dir: observability-bok
# Flat filenames (ka01-x.html, not ka01-x/index.html) so a built site/ opens
# directly from disk — directory URLs break under file://.
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.suggest

# offline inlines the search index so search works when the built site
# opens directly from disk — file:// blocks the search worker otherwise.
plugins:
  - search
  - offline

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

