# SUD Questions v2 — Motivation Chain Capture
#
# Redesigned instrument: restructures questions from entity-type organization
# (v1) to motivation-chain traversal order (v2). Same content, different
# capture sequence. The PO's reasoning path — who cares, why they care,
# what satisfies them, how we measure it — drives the question order.
#
# This is version 2 of the instrument. Version 1's question ordering is
# superseded.
#
# Design: motivation-chain traversal.
# the viewpoint schema is grounding, not a redesign
# health dimension frameworks are altitude-specific
#
# Every question has:
#   id:            Stable identifier (used by validators, skill references)
#   bare:          The bare-bones question (what field needs answering)
#   enhanced:      Prior-art-enhanced question (how to ask it well)
#   prior_art:     Named source(s) that inform the enhanced form
#   populates:     JSON field path(s) this answer fills
#   schema_ahead:  true if no JSON field exists yet
#   evidence:      Patterns that indicate this question was answered in a SUD

# --- Instrument-Level Principles ---
# These govern the AI agent's reasoning across ALL questions.
# Applied before any individual enhanced field.
# Carried forward verbatim from v1.

# Provenance Discipline
#
# The AI agent operating this instrument must distinguish three evidence levels
# for every claim in the SUD:
#
#   extracted:    Traceable to specific source material. The source said this.
#   inferred:     Reasonable conclusion from patterns or context, but the sources
#                 did not explicitly state it. Label as inferred. May be wrong.
#   constructed:  Generated without source evidence. A best guess. Label as
#                 constructed. Must be validated.
#
# When answering any question:
#   1. Look for source evidence first. Where sources provide evidence, extract it.
#   2. Where sources are silent, inference from context or patterns is acceptable
#      but must be labeled as inferred — never presented as extracted.
#   3. A SUD with honest provenance labeling is more trustworthy than one where
#      every answer looks equally confident. "Inferred — sources did not describe
#      fallback behavior" is better than a confident assertion from training knowledge.
#
# This discipline is not optional. The SUD's auditability depends on it.
# A consumer must be able to ask "how do you know?" for any claim and get
# a traceable answer.

# Reasoning Grounding
#
# Enhanced fields should ground the AI agent's reasoning in named prior art,
# defined criteria, or explicit examples — not vague instructions.
#
# Three forms of grounding:
#   named_prior_art:    Reference established standards by name. The name
#                       activates the agent's training knowledge about that
#                       standard's full methodology, not just the name.
#   defined_criteria:   Explicit distinctions the agent reasons from.
#                       "CRITICAL = blocks core function" gives a decision
#                       anchor. "With reasoning" gives nothing.
#   explicit_examples:  Show what good output looks like or define when
#                       each option applies. Distinguish, don't just list.
#
# The quality test: does the enhanced field produce reasoning good enough
# that downstream questions can rely on it? Poor reasoning at one question
# compounds into poor quality at every question that depends on it.
#
# Where an enhanced field references prior art, the agent's training
# knowledge is activated. Where it doesn't, the agent reasons from vague
# prompts. Grounding is the mechanism that makes reasoning GOOD.
# Provenance is the mechanism that makes it HONEST. Both are required.

schema_ground_truth: the adopter's reference fixture record
json_schema: the adopter's record schema

